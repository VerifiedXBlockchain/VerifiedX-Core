name: .NET Build and Unit Test Run

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  api-drift:
    # v1<->v2 API drift gate: fails if any live v1 endpoint is missing from
    # docs/api/v2-coverage-map.txt. Stdlib-only python, no restore needed.
    # See docs/api/drift-policy.md.
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - run: python3 tools/api_drift.py check

  build:
    strategy:
      fail-fast: false
      matrix:
        os: [windows-latest, ubuntu-latest]

    runs-on: ${{ matrix.os }}

    steps:
    - uses: actions/checkout@v4
    - name: Setup .NET
      uses: actions/setup-dotnet@v4
      with:
        dotnet-version: 6.0.x
    - name: Restore dependencies
      run: dotnet restore
    - name: Build
      run: dotnet build --no-restore
    - name: Test
      run: dotnet test --no-build --verbosity normal
